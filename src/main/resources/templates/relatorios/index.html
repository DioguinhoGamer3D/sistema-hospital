<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <meta charset="UTF-8">
    <title>Relatórios</title>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">🏥 Sistema Hospital</a>
        <div class="navbar-nav">
            <a class="nav-link text-white" href="/pacientes">Pacientes</a>
            <a class="nav-link text-white" href="/medicos">Médicos</a>
            <a class="nav-link text-white" href="/consultas">Consultas</a>
            <a class="nav-link text-white" href="/relatorios">Relatórios</a>
        </div>
    </div>
</nav>
<div class="container mt-4">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<h1>Relatórios</h1>

<p>Total de Pacientes: <strong th:text="${totalPacientes}"></strong></p>
<p>Total de Médicos: <strong th:text="${totalMedicos}"></strong></p>
<p>Total de Consultas: <strong th:text="${totalConsultas}"></strong></p>
<p>Faturamento Total: R$ <strong th:text="${faturamento}"></strong></p>

<h2>Médico(s) com mais consultas</h2>
    <table class="table table-bordered table-hover table-striped">
    <thead>
    <tr>
        <th>#</th>
        <th>Nome</th>
        <th>Especialidade</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="m : ${topMedicos}">
        <td th:text="${m.codM}"></td>
        <td th:text="${m.nome}"></td>
        <td th:text="${m.especialidade}"></td>
    </tr>
    </tbody>
</table>

<h2>Paciente(s) mais frequente(s)</h2>
    <table class="table table-bordered table-hover table-striped">
    <thead>
    <tr>
        <th>#</th>
        <th>Nome</th>
        <th>CPF</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="p : ${topPacientes}">
        <td th:text="${p.codP}"></td>
        <td th:text="${p.nome}"></td>
        <td th:text="${p.CPF}"></td>
    </tr>
    </tbody>
</table>
</div>
</body>
</html>
