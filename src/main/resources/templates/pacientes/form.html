<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <meta charset="UTF-8">
    <title th:text="${titulo}">Título</title>
</head>
<body>
<div class="container mt-4">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<h1 th:text="${titulo}">Título</h1>

<div th:if="${erro}" style="color:red" th:text="${erro}"></div>

<form th:action="${acao}" method="post">
    <label for="nome">Nome:</label>
    <input type="text" id="nome" name="nome"
           th:value="${paciente != null ? paciente.nome : ''}" required>

    <label for="cpf">CPF:</label>
    <input type="text" id="cpf" name="cpf"
           th:value="${paciente != null ? paciente.CPF : ''}" required>

    <label for="sexo">Sexo:</label>
    <select id="sexo" name="sexo" required>
        <option value="">Selecione</option>
        <option th:each="s : ${sexos}"
                th:value="${s}"
                th:text="${s}"
                th:selected="${paciente != null and paciente.sexo == s}">
        </option>
    </select>

    <label for="idade">Idade:</label>
    <input type="number" id="idade" name="idade"
           th:value="${paciente != null ? paciente.idade : ''}" min="0" required>

    <label for="convenio">Convênio:</label>
    <input type="text" id="convenio" name="convenio"
           th:value="${paciente != null ? paciente.convenio : ''}" required>

    <button type="submit">Salvar</button>
</form>
</div>
</body>
</html>
