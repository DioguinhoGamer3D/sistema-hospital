<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <meta charset="UTF-8"/>
    <title>Pacientes</title>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">🏥 Sistema Hospital</a>
        <div class="navbar-nav">
            <a class="nav-link text-white" href="/pacientes">Pacientes</a>
            <a class="nav-link text-white" href="/medicos">Médicos</a>
            <a class="nav-link text-white" href="/consultas">Consultas</a>
            <a class="nav-link text-white" href="/relatorios">Relatórios</a>
        </div>
    </div>
</nav>
<div class="container mt-4">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <h1>Pacientes</h1>

    <form method="get" action="/pacientes" class="row g-2 mb-3 align-items-center">
        <div class="col-auto">
            <select name="tipo" class="form-select">
                <option value="nome"     th:selected="${tipo == 'nome' or tipo == null}">Nome</option>
                <option value="convenio" th:selected="${tipo == 'convenio'}">Convênio</option>
            </select>
        </div>
        <div class="col-auto">
            <input type="text" name="busca" class="form-control"
                   placeholder="Buscar..."
                   th:value="${busca != null ? busca : ''}"/>
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-primary">Buscar</button>
            <a href="/pacientes" class="btn btn-secondary">Limpar</a>
        </div>
    </form>

    <a href="/pacientes/novo" class="btn btn-primary mb-3">+ Novo Paciente</a>

    <table class="table table-bordered table-hover table-striped">
        <thead>
            <tr>
                <th>#</th>
                <th>Nome</th>
                <th>CPF</th>
                <th>Idade</th>
                <th>Convênio</th>
                <th>Editar</th>
                <th>Remover</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="p : ${pacientes}">
                <td th:text="${p.codP}"></td>
                <td th:text="${p.nome}"></td>
                <td th:text="${p.CPF}"></td>
                <td th:text="${p.idade}"></td>
                <td th:text="${p.convenio}"></td>
                <td>
                    <a th:href="${'/pacientes/' + p.codP + '/editar'}" class="btn btn-sm btn-warning">Editar</a>
                </td>
                <td>
                    <form th:action="${'/pacientes/' + p.codP + '/remover'}" method="post"
                          onsubmit="return confirm('Remover paciente?')" style="display:inline">
                        <button type="submit" class="btn btn-sm btn-danger">Remover</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>
</div>
<script>
    document.querySelector('select[name="tipo"]').addEventListener('change', function() {
        document.querySelector('input[name="busca"]').value = '';
    });
</script>
</body>
</html>
