<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <meta charset="UTF-8">
    <title>Nova Consulta</title>
</head>
<body>
<div class="container mt-4">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<h1>Nova Consulta</h1>
<form th:action="${acao}" method="post">
    <label for="data">Data:</label>
    <input type="date" id="data" name="data" required><br><br>

    <label for="paciente">Paciente:</label>
    <select id="paciente" name="codP" required>
        <option value="">Selecione um paciente</option>
        <option th:each="p : ${pacientes}" th:value="${p.codP}" th:text="${p.nome}"></option>
    </select><br><br>

    <label for="medico">Médico:</label>
    <select id="medico" name="codM" required>
        <option value="">Selecione um médico</option>
        <option th:each="m : ${medicos}" th:value="${m.codM}" th:text="${m.nome}"></option>
    </select><br><br>

    <label for="diagnostico">Diagnóstico:</label>
    <input type="text" id="diagnostico" name="diagnostico" required><br><br>

    <label for="preco">Preço:</label>
    <input type="number" id="preco" name="preco" step="0.01" required><br><br>

    <button type="submit">Cadastrar</button>
</form>
</div>
</body>
</html>
