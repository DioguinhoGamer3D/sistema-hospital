<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <meta charset="UTF-8">
    <title th:text="${titulo}">Título</title>
</head>
<body>
<div class="container mt-4">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<h1 th:text="${titulo}">Título</h1>

<div th:if="${erro}" style="color:red" th:text="${erro}"></div>

<form th:action="${acao}" method="post">
    <label for="data">Data:</label>
    <input type="date" id="data" name="data"
           th:value="${consulta != null ? consulta.data : ''}" required><br><br>

    <label for="paciente">Paciente:</label>
    <select id="paciente" name="codP" required>
        <option value="">Selecione um paciente</option>
        <option th:each="p : ${pacientes}" th:value="${p.codP}" th:text="${p.nome}"
        th:selected="${consulta != null and consulta.paciente != null and consulta.paciente.codP == p.codP}">
        </option>
    </select><br><br>

    <label for="medico">Médico:</label>
    <select id="medico" name="codM" required>
        <option value="">Selecione um médico</option>
        <option th:each="m : ${medicos}" th:value="${m.codM}" th:text="${m.nome}"
                th:selected="${consulta != null and consulta.medico != null and consulta.medico.codM == m.codM}">        >
        </option>
    </select><br><br>

    <label for="diagnostico">Diagnóstico:</label>
    <input type="text" id="diagnostico" name="diagnostico"
           th:value="${consulta != null ? consulta.diagnostico : ''}" required><br><br>

    <label for="preco">Preço:</label>
    <input type="number" id="preco" name="preco" step="0.01"
           th:value="${consulta != null ? consulta.preco : ''}"><br><br>

    <button type="submit">Cadastrar</button>
</form>
</div>
</body>
</html>
