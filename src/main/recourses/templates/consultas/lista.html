<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <meta charset="UTF-8">
    <title>Consultas</title>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">🏥 Sistema Hospital</a>
        <div class="navbar-nav">
            <a class="nav-link text-white" href="/pacientes">Pacientes</a>
            <a class="nav-link text-white" href="/medicos">Médicos</a>
            <a class="nav-link text-white" href="/consultas">Consultas</a>
            <a class="nav-link text-white" href="/relatorios">Relatórios</a>
        </div>
    </div>
</nav>
<div class="container mt-4">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<h1>Consultas</h1>
    <a href="/consultas/nova" class="btn btn-primary mb-3">+ Nova Consulta</a>
    <table class="table table-bordered table-hover table-striped">
    <thead>
    <tr>
        <th>#</th>
        <th>Data</th>
        <th>Paciente</th>
        <th>Médico</th>
        <th>Diagnóstico</th>
        <th>Preço</th>
        <th>Editar</th>
        <th>Cancelar</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="c : ${consultas}">
        <td th:text="${c.codC}"></td>
        <td th:text="${c.data}"></td>
        <td th:text="${c.paciente.nome}"></td>
        <td th:text="${c.medico.nome}"></td>
        <td th:text="${c.diagnostico}"></td>
        <td th:text="${c.preco}"></td>
        <td><a th:href="${'/consultas/' + c.codC + '/editar'}" class="btn btn-sm btn-warning">Editar</a></td>
        <td>
        <form th:action="${'/consultas/' + c.codC + '/cancelar'}" method="post"
              onsubmit="return confirm('Cancelar consulta?')">
            <button type="submit" class="btn btn-sm btn-danger">Remover</button>
        </form>
        </td>
    </tr>
    </tbody>
</table>
</div>
</body>
</html>
