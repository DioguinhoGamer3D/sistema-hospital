<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <meta charset="UTF-8">
    <title>Consultas</title>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">🏥 Sistema Hospital</a>
        <div class="navbar-nav">
            <a class="nav-link text-white" href="/pacientes">Pacientes</a>
            <a class="nav-link text-white" href="/medicos">Médicos</a>
            <a class="nav-link text-white" href="/consultas">Consultas</a>
            <a class="nav-link text-white" href="/relatorios">Relatórios</a>
        </div>
    </div>
</nav>
<div class="container mt-4">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<h1>Consultas</h1>

    <form method="get" action="/consultas" class="row g-2 mb-3 align-items-center">
        <div class="col-auto">
            <select name="tipo" id="tipo-filtro" class="form-select" onchange="atualizarFiltro()">
                <option value="">Filtrar por...</option>
                <option value="paciente" th:selected="${tipo == 'paciente'}">Paciente</option>
                <option value="medico"   th:selected="${tipo == 'medico'}">Médico</option>
                <option value="data"     th:selected="${tipo == 'data'}">Data</option>
            </select>
        </div>

        <!-- Select de Pacientes -->
        <div class="col-auto" id="campo-paciente" style="display:none">
            <select name="valor" class="form-select">
                <option value="">Selecione um paciente...</option>
                <option th:each="p : ${pacientes}"
                        th:value="${p.codP}"
                        th:text="${p.nome}"
                        th:selected="${tipo == 'paciente' and valor == p.codP.toString()}">
                </option>
            </select>
        </div>

        <!-- Select de Médicos -->
        <div class="col-auto" id="campo-medico" style="display:none">
            <select name="valor" class="form-select">
                <option value="">Selecione um médico...</option>
                <option th:each="m : ${medicos}"
                        th:value="${m.codM}"
                        th:text="${m.nome}"
                        th:selected="${tipo == 'medico' and valor == m.codM.toString()}">
                </option>
            </select>
        </div>

        <!-- Input de Data -->
        <div class="col-auto" id="campo-data" style="display:none">
            <input type="date" name="valor" class="form-control"
                   th:value="${tipo == 'data' ? valor : ''}"/>
        </div>

        <div class="col-auto">
            <button type="submit" class="btn btn-primary">Filtrar</button>
            <a href="/consultas" class="btn btn-secondary">Limpar</a>
        </div>
    </form>

    <script>
        function atualizarFiltro() {
            const tipo = document.getElementById('tipo-filtro').value;

            const campoPaciente = document.getElementById('campo-paciente');
            const campoMedico   = document.getElementById('campo-medico');
            const campoData     = document.getElementById('campo-data');

            campoPaciente.style.display = tipo === 'paciente' ? 'block' : 'none';
            campoMedico.style.display   = tipo === 'medico'   ? 'block' : 'none';
            campoData.style.display     = tipo === 'data'     ? 'block' : 'none';

            // desabilita os campos escondidos para não serem enviados no form
            campoPaciente.querySelector('select').disabled = tipo !== 'paciente';
            campoMedico.querySelector('select').disabled   = tipo !== 'medico';
            campoData.querySelector('input').disabled      = tipo !== 'data';
        }

        atualizarFiltro();
    </script>

    <a href="/consultas/nova" class="btn btn-primary mb-3">+ Nova Consulta</a>
        <table class="table table-bordered table-hover table-striped">
        <thead>
            <tr>
                <th>#</th>
                <th>Data</th>
                <th>Paciente</th>
                <th>Médico</th>
                <th>Diagnóstico</th>
                <th>Preço</th>
                <th>Editar</th>
                <th>Cancelar</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="c : ${consultas}">
                <td th:text="${c.codC}"></td>
                <td th:text="${c.data}"></td>
                <td th:text="${c.paciente.nome}"></td>
                <td th:text="${c.medico.nome}"></td>
                <td th:text="${c.diagnostico}"></td>
                <td th:text="${c.preco}"></td>
                <td>
                    <a th:href="${'/consultas/' + c.codC + '/editar'}" class="btn btn-sm btn-warning">Editar</a>
                </td>
                <td>
                <form th:action="${'/consultas/' + c.codC + '/cancelar'}" method="post"
                      onsubmit="return confirm('Cancelar consulta?')">
                    <button type="submit" class="btn btn-sm btn-danger">Remover</button>
                </form>
                </td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
